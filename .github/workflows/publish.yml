name: CI

on:
  release:
    types:
      - created

jobs:
  build:
    runs-on: ${{ matrix.platform }}

    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install zvm and Zig stable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell -NoProfile -ExecutionPolicy Bypass -Command "irm https://www.zvm.app/install.ps1 | iex"
            echo "$USERPROFILE\.zvm\bin" >> "$GITHUB_PATH"
            echo "$USERPROFILE\.zvm\self" >> "$GITHUB_PATH"
          else
            curl -fsSL https://www.zvm.app/install.sh | bash
            echo "$HOME/.zvm/bin" >> "$GITHUB_PATH"
            echo "$HOME/.zvm/self" >> "$GITHUB_PATH"
          fi

      - name: Setup Zig stable
        shell: bash
        run: |
          zvm install stable
          zvm use stable
          zig version

      - name: Run tests
        shell: bash
        run: zig build test

      - name: Build
        shell: bash
        run: zig build
